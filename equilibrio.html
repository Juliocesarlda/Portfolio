<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Equilíbrio: Cotidiano Jovem - AI Powered</title>
    <style>
        :root { --telltale-red: #e74c3c; --text-white: #ffffff; --timer-speed: 20s; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; font-family: 'Segoe UI', sans-serif; overflow: hidden; color: var(--text-white); display: flex; flex-direction: column; }
        #intro-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 1s ease; }
        #intro-bg { position: absolute; width: 100%; height: 100%; background-image: url('equilibrio.png'); background-size: cover; background-position: center; opacity: 0.8; z-index: -1; }
        .titulo-intro { font-size: 3rem; letter-spacing: 8px; color: var(--telltale-red); text-transform: uppercase; text-align: center; text-shadow: 0 0 20px rgba(231, 76, 60, 0.5); }
        .btn-play { background: transparent; border: 2px solid #fff; color: #fff; padding: 15px 50px; font-size: 1.2rem; cursor: pointer; text-transform: uppercase; letter-spacing: 3px; transition: 0.3s; }
        .btn-play:hover { background: #fff; color: #000; }
        #container-visual { flex: 1; position: relative; width: 100%; background: #000; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        #bg-image { width: 100%; height: 100%; background-size: contain; background-repeat: no-repeat; background-position: center; transition: background-image 0.5s ease-in-out; }
        #game-interface { height: 42%; background: #121212; padding: 15px 30px; box-sizing: border-box; display: flex; flex-direction: column; justify-content: space-between; border-top: 4px solid var(--telltale-red); z-index: 10; box-shadow: 0 -10px 20px rgba(0,0,0,0.5); }
        #notification { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); font-style: italic; background: rgba(0, 0, 0, 0.8); padding: 10px 20px; border-bottom: 2px solid var(--telltale-red); opacity: 0; transition: opacity 0.5s; z-index: 100; }
        #pergunta-texto { font-size: 1.2rem; line-height: 1.3; font-weight: 600; text-align: center; }
        #botoes-respostas { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-escolha { background: #222; border: 1px solid #444; color: #ddd; padding: 12px; font-size: 0.85rem; cursor: pointer; text-transform: uppercase; transition: 0.2s; }
        .btn-escolha:hover { background: #fff; color: #000; transform: translateY(-2px); }
        #timer-container { width: 100%; height: 4px; background: #333; margin-top: 10px; }
        #timer-bar { width: 100%; height: 100%; background: var(--telltale-red); }
        .animar-timer { animation: timer-shrink var(--timer-speed) linear forwards; }
        @keyframes timer-shrink { from { width: 100%; } to { width: 0%; } }
        .final-screen #botoes-respostas { display: flex; justify-content: center; }
    </style>
</head>
<body>
    <audio id="bg-music" loop><source src="mixkit-mysterious-long-swell-2671.mp3" type="audio/mpeg"></audio>

    <div id="intro-screen">
        <div id="intro-bg"></div>
        <!-- <h1 class="titulo-intro">EQUILÍBRIO</h1> -->
         <br><br><br><br><br><br><br><br><br><br><br><br>
        <p style="margin-bottom: 40px; letter-spacing: 2px;">(IA POWERED)</p>
        <button class="btn-play" onclick="comecarJogo()">INICIAR</button>
    </div>

    <div id="notification"></div>
    <div id="container-visual"><div id="bg-image"></div></div>
    <div id="game-interface">
        <div id="pergunta-texto">Iniciando diagnóstico comportamental...</div>
        <div id="botoes-respostas"></div>
        <div id="timer-container"><div id="timer-bar"></div></div>
    </div>

    <script>
        const modeloIA = {
            pacificador: { pacificador: 0.85, determinado: 0.10, cauteloso: 0.03, impulsivo: 0.02 },
            determinado: { pacificador: 0.05, determinado: 0.85, cauteloso: 0.05, impulsivo: 0.05 },
            cauteloso:   { pacificador: 0.10, determinado: 0.05, cauteloso: 0.80, impulsivo: 0.05 },
            impulsivo:   { pacificador: 0.02, determinado: 0.08, cauteloso: 0.10, impulsivo: 0.80 }
        };

        let dadosTreinamento = []; 
        let diaAtual = 0;
        let timer;

        const jornada = [
    { q: "Um amigo postou algo que te ofendeu indiretamente nos Stories. O que você faz?", img: "situação_1.png", 
      opcoes: [{ t: "Responder no privado", v: "impulsivo", n: "Confronto imediato." }, { t: "Apenas silenciar", v: "cauteloso", n: "Evitação passiva." }, { t: "Conversar pessoalmente", v: "pacificador", n: "Busca por diálogo." }, { t: "Ignorar e seguir", v: "determinado", n: "Foco no próprio dia." }] },
    
    { q: "Você vê alguém sendo excluído em uma roda de amigos. Qual sua atitude?", img: "situação_2.png", 
      opcoes: [{ t: "Observar de longe", v: "cauteloso", n: "Receio de se envolver." }, { t: "Puxar assunto com ela", v: "pacificador", n: "Inclusão promovida." }, { t: "Chamar no canto depois", v: "determinado", n: "Apoio estratégico." }, { t: "Fazer uma piada", v: "impulsivo", n: "Tentativa de quebrar gelo." }] },
    
    { q: "O prazo de um trabalho importante acaba hoje e você não começou.", img: "situação_3.png", 
      opcoes: [{ t: "Trabalhar sob pressão", v: "impulsivo", n: "Adrenalina e risco." }, { t: "Pedir adiamento", v: "cauteloso", n: "Medo do fracasso." }, { t: "Focar e fazer o melhor", v: "determinado", n: "Execução pragmática." }, { t: "Pedir ajuda a alguém", v: "pacificador", n: "Colaboração buscada." }] },
    
    { q: "Você recebeu um feedback negativo sobre um projeto autoral seu.", img: "situação_4.png", 
      opcoes: [{ t: "Ficar na defensiva", v: "impulsivo", n: "Ego ferido." }, { t: "Anotar e melhorar", v: "determinado", n: "Evolução técnica." }, { t: "Se sentir incapaz", v: "cauteloso", n: "Insegurança gerada." }, { t: "Agradecer e refletir", v: "pacificador", n: "Maturidade emocional." }] },
    
    { q: "Seus pais discordam totalmente da carreira que você quer seguir.", img: "situação_5.png", 
      opcoes: [{ t: "Discutir e impor", v: "impulsivo", n: "Atrito familiar." }, { t: "Tentar um acordo", v: "pacificador", n: "Mediação buscada." }, { t: "Fazer escondido", v: "cauteloso", n: "Ocultação de planos." }, { t: "Apresentar fatos", v: "determinado", n: "Persuasão lógica." }] },
    
    { q: "Você está em um evento cultural e percebe que perdeu o celular.", img: "situação_6.png", 
      opcoes: [{ t: "Entrar em pânico", v: "impulsivo", n: "Descontrole momentâneo." }, { t: "Pedir ajuda no balcão", v: "determinado", n: "Ação coordenada." }, { t: "Refazer seus passos", v: "cauteloso", n: "Análise retrospectiva." }, { t: "Manter a calma", v: "pacificador", n: "Equilíbrio emocional." }] },
    
    { q: "Um colega está espalhando um boato falso sobre você.", img: "situação_7.png", 
      opcoes: [{ t: "Expor ele publicamente", v: "impulsivo", n: "Vingança escolhida." }, { t: "Chamar para conversa", v: "pacificador", n: "Resolução diplomática." }, { t: "Deixar que esqueçam", v: "cauteloso", n: "Espera passiva." }, { t: "Provar a verdade", v: "determinado", n: "Defesa objetiva." }] },
    
    { q: "Você sente que está viciado no celular e isso atrapalha seu sono.", img: "situação_8.png", 
      opcoes: [{ t: "Desinstalar tudo", v: "determinado", n: "Corte radical." }, { t: "Tentar diminuir", v: "pacificador", n: "Mudança gradual." }, { t: "Aceitar que é assim", v: "impulsivo", n: "Conformismo." }, { t: "Colocar limites", v: "cauteloso", n: "Controle vigiado." }] },
    
    { q: "Alguém te pede um favor que vai ocupar todo seu fim de semana.", img: "situação_9.png", 
      opcoes: [{ t: "Dizer 'não' educadamente", v: "determinado", n: "Limite estabelecido." }, { t: "Dizer 'sim' e sofrer", v: "cauteloso", n: "Auto-sacrifício." }, { t: "Inventar uma desculpa", v: "impulsivo", n: "Fuga criativa." }, { t: "Ajudar com alegria", v: "pacificador", n: "Altruísmo real." }] },
    
    { q: "Como você avalia sua capacidade de lidar com imprevistos hoje?", img: "situação_10.png", 
      opcoes: [{ t: "Sou imprevisível", v: "impulsivo", n: "Instabilidade." }, { t: "Sou resiliente", v: "pacificador", n: "Flexibilidade." }, { t: "Sou metódico", v: "determinado", n: "Organização." }, { t: "Sou inseguro", v: "cauteloso", n: "Dúvida constante." }] }
    ];



        function comecarJogo() {
            const musica = document.getElementById('bg-music');
            musica.volume = 0.4;
            musica.play().catch(e => console.log("Áudio bloqueado"));
            document.getElementById('intro-screen').style.opacity = '0';
            setTimeout(() => { document.getElementById('intro-screen').style.display = 'none'; carregarCena(); }, 1000);
        }

        function carregarCena() {
    if (diaAtual >= jornada.length) { finalizarJogoIA(); return; }
    const cena = jornada[diaAtual];
    
    // Atualiza a imagem de fundo
    const bgElement = document.getElementById('bg-image');
    bgElement.style.backgroundImage = `url('${cena.img}')`;
    
    document.getElementById('pergunta-texto').innerText = cena.q;
    const container = document.getElementById('botoes-respostas');
    container.innerHTML = "";
    
    cena.opcoes.forEach(opt => {
        const btn = document.createElement('button');
        btn.className = "btn-escolha";
        btn.innerText = opt.t;
        btn.onclick = () => escolher(opt.n, opt.v);
        container.appendChild(btn);
    });

    const bar = document.getElementById('timer-bar');
    bar.classList.remove('animar-timer');
    void bar.offsetWidth; 
    bar.classList.add('animar-timer');
    clearTimeout(timer);
    timer = setTimeout(() => escolher("O tempo esgotou.", "cauteloso"), 20000);
}

        function escolher(notificacao, valor) {
            clearTimeout(timer);
            dadosTreinamento.push(valor || "cauteloso");
            const n = document.getElementById('notification');
            n.innerText = notificacao;
            n.style.opacity = 1;
            setTimeout(() => { n.style.opacity = 0; }, 2500);
            diaAtual++;
            setTimeout(carregarCena, 1200);
        }

        function finalizarJogoIA() {
            let probs = { pacificador: 0.25, determinado: 0.25, cauteloso: 0.25, impulsivo: 0.25 };
            
            dadosTreinamento.forEach(escolha => {
                for (let perfil in probs) {
                    probs[perfil] *= modeloIA[escolha][perfil];
                }
                let total = Object.values(probs).reduce((a, b) => a + b);
                for (let perfil in probs) probs[perfil] /= total;
            });

            const perfilFinal = Object.keys(probs).reduce((a, b) => probs[a] > probs[b] ? a : b);
            const confianca = Math.round(probs[perfilFinal] * 100);

            const analisesIA = {
                pacificador: "O modelo estatístico detectou um algoritmo de harmonia social.\nVocê busca o equilíbrio entre as partes, priorizando a diplomacia no cotidiano.",
                determinado: "O classificador identifica um padrão de foco e resolução.\nSuas decisões são práticas e voltadas para resultados concretos nas tarefas diárias.",
                cauteloso: "A IA detectou um padrão de análise de risco e autopreservação.\nVocê prefere observar e calcular antes de agir em situações de incerteza social.",
                impulsivo: "Seu perfil indica alta reatividade aos estímulos do ambiente.\nVocê toma decisões rápidas baseadas na intuição e no momento presente."
            };

            document.getElementById('game-interface').classList.add('final-screen');
            const txt = document.getElementById('pergunta-texto');
            txt.style.fontSize = "0.95rem";
            txt.style.whiteSpace = "pre-line";
            txt.innerHTML = `<b>DIAGNÓSTICO COMPORTAMENTAL (IA):</b>\nConfiança do Algoritmo: ${confianca}%\n\n${analisesIA[perfilFinal]}`;
            
            document.getElementById('botoes-respostas').innerHTML = `<button class="btn-escolha" onclick="location.reload()">REINICIAR</button>`;
            document.getElementById('timer-container').style.display = 'none';
        }
    </script>
</body>
</html>

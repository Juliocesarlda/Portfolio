<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>
        Equilíbrio: Eco-Edition (Greenpeace & AI)
    </title>
    <style>
        :root {
            --greenpeace-green: #3d7e1f;
            --greenpeace-yellow: #ffde00;
            --text-white: #ffffff;
            --timer-speed: 20s;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: #000;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
            color: var(--text-white);
            display: flex;
            flex-direction: column;
        }
        
        #intro-screen {
            position: fixed;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 2000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 1s ease;
        }

        #intro-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.7)), url('equilibrioeco.png');
            background-size: cover;
            background-position: center;
            opacity: 0.8;
            z-index: -1;
        }
        
        .titulo-intro {
            font-size: 3rem;
            letter-spacing: 8px;
            color: var(--greenpeace-yellow);
            text-transform: uppercase;
            text-align: center;
            text-shadow: 0 0 20px rgba(255, 222, 0, 0.4); margin-bottom: 0;
        }

        .subtitulo-intro {
            margin-bottom: 40px;
            letter-spacing: 2px;
            color: var(--greenpeace-green);
            font-weight: bold;
        }
        
        /* Botão de áudio estilo 'Steve' */
        .btn-audio-acessivel {
            background: var(--greenpeace-green);
            border: none;
            color: var(--greenpeace-yellow);
            cursor: pointer;
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 1.2rem;
            margin-left: 10px;
            transition: 0.2s;
        }

        .btn-audio-acessivel:hover {
            transform: scale(1.1);
            background: #4a9425;
        }

        /* Ajuste para o texto da pergunta com o botão ao lado */
        #pergunta-container-flex {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 10px;
        }
    
        .btn-play {
            background: transparent;
            border: 2px solid var(--greenpeace-yellow);
            color: var(--greenpeace-yellow);
            padding: 15px 50px;
            font-size: 1.2rem;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 3px;
            transition: 0.3s;
        }

        .btn-play:hover {
            background: var(--greenpeace-yellow);
            color: #000;
        }
        
        #container-visual {
            flex: 1;
            position: relative;
            width: 100%;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        #bg-image {
            width: 100%;
            height: 100%;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            transition: background-image 0.5s ease-in-out;
        }

        #game-interface {
            height: 42%;
            background: #1a1a1a;
            padding: 15px 30px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            border-top: 4px solid var(--greenpeace-green);
            z-index: 10;
        }
        
        #notification {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-style: italic;
            background: rgba(61, 126, 31, 0.9);
            padding: 10px 20px;
            border-radius: 5px;
            opacity: 0;
            transition: opacity 0.5s;
            z-index: 100;
            text-align: center;
        }
    
        #pergunta-texto {
            font-size: 1.1rem;
            line-height: 1.4;
            font-weight: 600;
            text-align: center;
            color: #eee;
        }
    
        #botoes-respostas {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .btn-escolha {
            background: #2a2a2a;
            border: 1px solid #444;
            color: #fff;
            padding: 12px;
            font-size: 0.85rem;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.2s;
        }

        .btn-escolha:hover {
            background: var(--greenpeace-green);
            border-color: var(--greenpeace-yellow);
            transform: translateY(-2px);
        }
    
        #timer-container {
            width: 100%;
            height: 6px;
            background: #333;
            margin-top: 10px;
            border-radius: 3px;
        }

        #timer-bar {
            width: 100%;
            height: 100%;
            background: var(--greenpeace-yellow);
            border-radius: 3px;
        }

        .animar-timer {
            animation: timer-shrink var(--timer-speed) linear forwards;
        }

        @keyframes timer-shrink {
            from {
                width: 100%;
            } to {
                width: 0%;
            }
        }

        .final-screen #botoes-respostas {
            display: flex;
            justify-content: center;
        }
    </style>
</head>

function comecarJogo() {
    const musica = document.getElementById('bg-music');
    musica.volume = 0.4;
    musica.play().catch(() => console.log("Áudio bloqueado"));

    // GATILHO DE VOZ: Cria uma fala vazia para habilitar o som no navegador
    const inicializarVoz = new SpeechSynthesisUtterance("");
    window.speechSynthesis.speak(inicializarVoz);

    document.getElementById('intro-screen').style.opacity = '0';
    setTimeout(() => { 
        document.getElementById('intro-screen').style.display = 'none'; 
        carregarCena(); 
    }, 1000);
}
function carregarCena() {
    if (diaAtual >= jornada.length) { finalizarJogoIA(); return; }
    const cena = jornada[diaAtual];
    document.getElementById('bg-image').style.backgroundImage = `url('${cena.img}')`;
    
    // Interface de Pergunta com Botão de Som
    const interfaceTexto = document.getElementById('pergunta-texto');
    interfaceTexto.innerHTML = `
        <div style="display: flex; align-items: center; justify-content: center; gap: 10px;">
            <span id="txt-pergunta">${cena.q}</span>
            <button class="btn-audio-acessivel" onclick="ouvirTexto('txt-pergunta')">🔊</button>
        </div>
    `;

    const container = document.getElementById('botoes-respostas');
    container.innerHTML = "";
    
    cena.opcoes.forEach((opt, index) => {
        const idOpt = `opt-${index}`;
        const divWrapper = document.createElement('div');
        divWrapper.style.display = "flex";
        divWrapper.style.gap = "5px";
        divWrapper.style.marginBottom = "8px";

        divWrapper.innerHTML = `
            <button class="btn-escolha" style="flex: 1;" onclick="escolher('${opt.n}', '${opt.v}')">
                <span id="${idOpt}">${opt.t}</span>
            </button>
            <button class="btn-audio-acessivel" onclick="ouvirTexto('${idOpt}')">🔊</button>
        `;
        container.appendChild(divWrapper);
    });

    // O TIMER FOI REMOVIDO DAQUI
}

function escolher(notificacao, valor) {
    // Interrompe qualquer fala anterior para narrar a consequência
    window.speechSynthesis.cancel();
    
    dadosTreinamento.push(valor || "cauteloso");

    const bgImage = document.getElementById('bg-image');

        else if (valor === 'pacificador') bgImage.style.backgroundImage = "url('1_2_alertartrilheiros.png')";
        else if (valor === 'cauteloso') bgImage.style.backgroundImage = "url('1_3_naoconfrontaresair.png')";

    }

        else if (valor === 'pacificador') bgImage.style.backgroundImage = "url('2_2_campanhapraialimpa.png')";
        else if (valor === 'cauteloso') bgImage.style.backgroundImage = "url('2_3_procuraroutrapraia.png')";
        else bgImage.style.backgroundImage = "url('2_4_protestarnaprefeitura.png')";

    else if (perguntaTextoAtual.includes("Morro do Cristo")) {

        else if (valor === 'pacificador') bgImage.style.backgroundImage = "url('3_2_guiaabiental.png')";

        else if (valor === 'pacificador') bgImage.style.backgroundImage = "url('4_2_divulgarparaosamigos.png')";

function ouvirTexto(elementoId) {
    // 1. Forçar parada de qualquer fala anterior (Limpa o cache da voz)
    window.speechSynthesis.cancel();

    const elemento = document.getElementById(elementoId);
    if (!elemento) return;

    const texto = elemento.innerText;
    const narrador = new SpeechSynthesisUtterance(texto);
    
    // 2. Configurações cruciais
    narrador.lang = 'pt-BR';
    narrador.rate = 0.9;
    narrador.pitch = 1.0;
    narrador.volume = 1.0; // Garante volume máximo da IA

    // 3. O "Pulo do Gato": Alguns navegadores precisam de um pequeno delay
    setTimeout(() => {
        window.speechSynthesis.speak(narrador);
    }, 50);

    // Debug para você ver no console (F12) se o código chegou aqui
    console.log("Steve informa: Tentando narrar -> " + texto);
}

function enviarDadosParaNuvem() {
// Configuração da versão Greenpeace - Maré de Consciência
const CONFIG_PROJETO = {
    nome: "Equilíbrio: Eco-Edition",
    versao: "Greenpeace - Maré de Consciência",
    local: "Escola Municipal - Guaratuba",
    endpoint: "https://script.google.com/macros/s/AKfycbyCx5N-0xt2Q73tFj9uXPZFNAtGkMgWRMyl_-UI5vLbwqDJZwTgIvZi22Z7SrKzGOv4Gg/exec"
};

// Função para processar o resultado do Naive Bayes e enviar
// Substitua sua função enviarDadosParaNuvem por esta estrutura global
async function registrarResultado(perfilFinal, pontuacaoTotal) {
    const CONFIG_PROJETO = {
        endpoint: "https://script.google.com/macros/s/AKfycbyCx5N-0xt2Q73tFj9uXPZFNAtGkMgWRMyl_-UI5vLbwqDJZwTgIvZi22Z7SrKzGOv4Gg/exec",
        local: "Escola Municipal - Guaratuba",
        versao: "Greenpeace - Maré de Consciência"
    };

    const payload = {
        cidade: "Guaratuba",
        escola: CONFIG_PROJETO.local,
        perfil: perfilFinal,
        pontuacao: pontuacaoTotal,
        versao: CONFIG_PROJETO.versao
    };

    try {
        await fetch(CONFIG_PROJETO.endpoint, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });
        console.log("Soberania de dados confirmada: Planilha atualizada.");
    } catch (error) {
        console.error("Erro ao reportar dados:", error);
    }
}
}

window.speechSynthesis.cancel(); // Limpa filas travadas
const wakeUp = new SpeechSynthesisUtterance("");

    let probs = { pacificador: 0.25, determinado: 0.25, cauteloso: 0.25, impulsivo: 0.25, observador: 0.25 };
    
    dadosTreinamento.forEach(escolha => {
        if (modeloIA[escolha]) {
            for (let perfil in probs) probs[perfil] *= modeloIA[escolha][perfil];
            let total = Object.values(probs).reduce((a, b) => a + b);
            for (let perfil in probs) probs[perfil] /= total;
        }
    });

    const perfilFinal = Object.keys(probs).reduce((a, b) => probs[a] > probs[b] ? a : b);
    const confianca = Math.round(probs[perfilFinal] * 100);

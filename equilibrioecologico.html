<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Equilíbrio: Eco-Edition (Greenpeace & AI)</title>
    <style>
        :root { 
            --greenpeace-green: #3d7e1f; 
            --greenpeace-yellow: #ffde00; 
            --text-white: #ffffff; 
            --bg-dark: #1a1a1a;
            --timer-speed: 20s; 
        }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #000; font-family: 'Segoe UI', sans-serif; 
            overflow: hidden; color: var(--text-white); 
            display: flex; flex-direction: column; 
        }

        /* --- TELA DE INTRODUÇÃO --- */
        #intro-screen { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #000; z-index: 2000; display: flex; 
            flex-direction: column; align-items: center; justify-content: center; 
            transition: opacity 1s ease; text-align: center; padding: 20px;
        }
        #intro-bg { 
            position: absolute; width: 100%; height: 100%; 
            background: linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.7)), url('equilibrioeco.png'); 
            background-size: cover; background-position: center; opacity: 0.8; z-index: -1; 
        }
        .titulo-intro { 
            font-size: clamp(2rem, 8vw, 3rem); letter-spacing: 5px; 
            color: var(--greenpeace-yellow); text-transform: uppercase; 
            text-shadow: 0 0 20px rgba(255, 222, 0, 0.4); margin-bottom: 0; 
        }
        .subtitulo-intro { margin-bottom: 40px; color: var(--greenpeace-green); font-weight: bold; letter-spacing: 2px; }
        .btn-play { background: transparent; border: 2px solid var(--greenpeace-yellow); color: var(--greenpeace-yellow); padding: 15px 40px; font-size: 1.1rem; cursor: pointer; text-transform: uppercase; transition: 0.3s; }

        /* --- ÁREA VISUAL --- */
        #container-visual { flex: 1; position: relative; width: 100%; background: #000; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        #bg-image { width: 100%; height: 100%; background-size: contain; background-repeat: no-repeat; background-position: center; transition: background-image 0.5s ease; }

        /* --- INTERFACE DE JOGO --- */
        #game-interface { 
            height: 45%; background: var(--bg-dark); 
            padding: 15px; box-sizing: border-box; display: flex; 
            flex-direction: column; border-top: 4px solid var(--greenpeace-green); 
            z-index: 10;
        }

        #pergunta-texto { 
            font-size: 1rem; line-height: 1.4; font-weight: 600; 
            text-align: center; color: #eee; margin-bottom: 12px;
        }

        #botoes-respostas { 
            display: grid; 
            grid-template-columns: 1fr;
            gap: 8px; 
            width: 100%; 
        }
        @media (min-width: 768px) { #botoes-respostas { grid-template-columns: 1fr 1fr; } }

        .wrapper-opcao { display: flex; gap: 8px; align-items: stretch; width: 100%; box-sizing: border-box; }

        .btn-escolha { 
            flex: 1; min-width: 0; background: #2a2a2a; border: 1px solid #444; 
            color: #fff; padding: 12px 8px; font-size: 0.82rem; cursor: pointer; 
            text-transform: uppercase; display: flex; align-items: center; 
            justify-content: center; text-align: center; word-wrap: break-word;
        }

        .btn-audio-acessivel {
            flex-shrink: 0; width: 45px; background: var(--greenpeace-green); 
            border: none; color: var(--greenpeace-yellow); cursor: pointer; 
            border-radius: 4px; font-size: 1.2rem; display: flex; 
            align-items: center; justify-content: center;
        }

        #notification { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: rgba(61, 126, 31, 0.95); padding: 15px 20px; border-radius: 8px; border: 1px solid var(--greenpeace-yellow); opacity: 0; transition: opacity 0.5s; z-index: 3000; text-align: center; width: 85%; max-width: 500px; }
        #timer-container { width: 100%; height: 6px; background: #333; margin-top: auto; border-radius: 3px; }
        #timer-bar { width: 100%; height: 100%; background: var(--greenpeace-yellow); border-radius: 3px; }
    </style>
</head>
<body>
    <audio id="bg-music" loop><source src="slap-bass-riff-dan-barracuda-1-00-04.mp3" type="audio/mpeg"></audio>

    <div id="intro-screen">
        <div id="intro-bg"></div>
        <h1 class="titulo-intro">EQUILÍBRIO</h1>
        <p class="subtitulo-intro">ECO-EDITION (AI POWERED)</p>
        <button class="btn-play" onclick="comecarJogo()">INICIAR MISSÃO</button>
    </div>

    <div id="notification"></div>
    <div id="container-visual"><div id="bg-image"></div></div>
    
    <div id="game-interface">
        <div id="pergunta-texto">Carregando biosfera...</div>
        <div id="botoes-respostas"></div>
        <div id="timer-container"><div id="timer-bar"></div></div>
    </div>

    <script>
        const modeloIA = {
            pacificador: { pacificador: 0.85, determinado: 0.10, cauteloso: 0.03, impulsivo: 0.02, observador: 0.05 },
            determinado: { pacificador: 0.05, determinado: 0.85, cauteloso: 0.05, impulsivo: 0.05, observador: 0.05 },
            cauteloso:   { pacificador: 0.10, determinado: 0.05, cauteloso: 0.80, impulsivo: 0.05, observador: 0.10 },
            impulsivo:   { pacificador: 0.02, determinado: 0.08, cauteloso: 0.10, impulsivo: 0.80, observador: 0.05 },
            observador:  { pacificador: 0.10, determinado: 0.05, cauteloso: 0.15, impulsivo: 0.05, observador: 0.80 }
        };

        let dadosTreinamento = []; 
        let diaAtual = 0;

        const jornada = [
            { q: "Ao chegar no local onde o ferry boat costumava ser a única opção, você se depara com um canteiro de obras e precisa decidir como agir:", img: "0_0_pontedeguaratuba.png", 
              opcoes: [{ t: "Exigir a paralisação da obra", v: "determinado", n: "Rigor legal e proteção da orla." }, { t: "Propor uma audiência pública", v: "pacificador", n: "Equilíbrio através do diálogo democrático." }, { t: "Documentar para registro histórico do local", v: "cauteloso", n: "Preservação da memória ambiental." }, { t: "Organizar um protesto pacífico", v: "determinado", n: "Mobilização popular urgente." }] },
            
            { q: "Você percebe a extração ilegal de palmito juçara em uma trilha no Morro do Cabaraquara.", img: "1_0_extracaoilegaldepalmito.png", 
              opcoes: [{ t: "Chamar a Polícia Ambiental", v: "determinado", n: "Intervenção legal." }, { t: "Alertar outros trilheiros", v: "pacificador", n: "Rede de proteção." }, { t: "Não confrontar e sair", v: "cauteloso", n: "Segurança pessoal." }, { t: "Tirar fotos dos infratores", v: "impulsivo", n: "Produção de prova." }] },
            
            { q: "A Praia Central apresenta bandeira imprópria para banho devido ao esgoto clandestino.", img: "esgotoclandestinoaberto.png", 
              opcoes: [{ t: "Exigir lacre de esgoto", v: "determinado", n: "Rigor sanitário." }, { t: "Campanha 'Praia Limpa'", v: "pacificador", n: "Conscientização coletiva." }, { t: "Procurar praia mais longe", v: "cauteloso", n: "Adaptação pessoal." }, { t: "Protestar na prefeitura", v: "impulsivo", n: "Cobrança política." }] },
            
            { q: "Durante a temporada, o barulho excessivo e lixo afetam a fauna no Morro do Cristo.", img: "3_0_morrodocristosomalto.png", 
              opcoes: [{ t: "Interromper sons altos", v: "impulsivo", n: "Confronto direto." }, { t: "Sugerir guias ambientais", v: "pacificador", n: "Turismo sustentável." }, { t: "Visitar em horários calmos", v: "cauteloso", n: "Impacto reduzido." }, { t: "Pedir cercamento da área", v: "determinado", n: "Proteção estrutural." }] },
            
            { q: "O Greenpeace abre vagas para monitorar as tartarugas marinhas no litoral paranaense.", img: "tartaruganapraiadeguaratuba.png", 
              opcoes: [{ t: "Me inscrever agora", v: "impulsivo", n: "Decisão imediata." }, { t: "Divulgar para amigos", v: "pacificador", n: "Mobilização de rede." }, { t: "Avaliar se tenho tempo", v: "cauteloso", n: "Análise realista." }, { t: "Estudar biologia marinha", v: "determinado", n: "Preparação técnica." }] },
            
            { q: "O Mercado Municipal de Guaratuba ainda usa muitas sacolas plásticas não biodegradáveis.", img: "mercadomucipalsacolasplasticas.png", 
              opcoes: [{ t: "Propor lei de banimento", v: "determinado", n: "Mudança normativa." }, { t: "Levar sacola ecologica", v: "cauteloso", n: "Hábito consciente." }, { t: "Oficina de sacola de papel recilcável", v: "pacificador", n: "Alternativa prática." }, { t: "Reclamar com os boxes", v: "impulsivo", n: "Cobrança direta." }] },
            
            { q: "Você vê um animal silvestre (como um bicho-preguiça) tentando atravessar a rodovia PR-412.", img: "bichopreguiçaatravessandoestrada.png", 
              opcoes: [{ t: "Parar o trânsito na hora", v: "impulsivo", n: "Ação de risco." }, { t: "Chamar o resgate técnico", v: "determinado", n: "Procedimento correto." }, { t: "Sinalizar para trânsito", v: "pacificador", n: "Alerta comunitário." }, { t: "Observar de longe", v: "observador", n: "Registro científico." }] },
            
            { q: "O ecossistema de manguezal na Baía de Guaratuba está sendo aterrado ilegalmente.", img: "aterramentoilegal.png", 
              opcoes: [{ t: "Denunciar ao IAT", v: "determinado", n: "Fiscalização oficial." }, { t: "Postar vídeo do local", v: "impulsivo", n: "Pressão nas redes." }, { t: "Palestras escolares", v: "pacificador", n: "Conscientização base." }, { t: "Acionar a Força Verde", v: "determinado", n: "Intervenção policial." }] },
            
            { q: "Obras na orla podem afetar a restinga e as dunas. Como você vê o futuro da nossa costa?", img: "8_0_obrasnasdunaserestinga.png", 
              opcoes: [{ t: "Preocupação urgente", v: "impulsivo", n: "Alerta ambiental." }, { t: "Debater o projeto", v: "pacificador", n: "Equilíbrio urbano." }, { t: "Fiscalizar as licenças", v: "observador", n: "Rigor técnico." }, { t: "Confiar nos engenheiros", v: "pacificador", n: "Postura neutra." }] },
            
            { q: "A pesca artesanal em Guaratuba sofre com a poluição por microplásticos.", img: "9_0_baiadeguaratuba.png", 
              opcoes: [{ t: "Proibir plásticos na baía", v: "determinado", n: "Lei municipal rígida." }, { t: "Apoiar cooperativas", v: "pacificador", n: "Fortalecimento local." }, { t: "Consumir menos plástico", v: "cauteloso", n: "Redução na fonte." }, { t: "Protestar no trapiche", v: "impulsivo", n: "Visibilidade rápida." }] }
        ];

        function comecarJogo() {
            document.getElementById('bg-music').play().catch(() => {});
            window.speechSynthesis.speak(new SpeechSynthesisUtterance(""));
            document.getElementById('intro-screen').style.opacity = '0';
            setTimeout(() => { document.getElementById('intro-screen').style.display = 'none'; carregarCena(); }, 1000);
        }

        function carregarCena() {
            if (diaAtual >= jornada.length) { finalizarJogoIA(); return; }
            const cena = jornada[diaAtual];
            document.getElementById('bg-image').style.backgroundImage = `url('${cena.img}')`;
            
            document.getElementById('pergunta-texto').innerHTML = `
                <div style="display: flex; align-items: center; justify-content: center; gap: 8px;">
                    <span id="txt-pergunta" style="flex: 1;">${cena.q}</span>
                    <button class="btn-audio-acessivel" style="height: 38px;" onclick="ouvirTexto('txt-pergunta')">🔊</button>
                </div>
            `;

            const container = document.getElementById('botoes-respostas');
            container.innerHTML = "";
            cena.opcoes.forEach((opt, index) => {
                const idOpt = `opt-${index}`;
                const wrapper = document.createElement('div');
                wrapper.className = "wrapper-opcao";
                wrapper.innerHTML = `
                    <button class="btn-escolha" onclick="escolher('${opt.n}', '${opt.v}')">
                        <span id="${idOpt}">${opt.t}</span>
                    </button>
                    <button class="btn-audio-acessivel" onclick="ouvirTexto('${idOpt}')">🔊</button>
                `;
                container.appendChild(wrapper);
            });
        }

        function escolher(notificacao, valor) {
    // --- TRAVA DE SEGURANÇA (NOVO) ---
    // Seleciona todos os botões de escolha e os desabilita imediatamente
    const botoes = document.querySelectorAll('.btn-escolha');
    botoes.forEach(btn => {
        btn.disabled = true; 
        btn.style.opacity = "0.6"; // Feedback visual de que a opção foi registrada
        btn.style.cursor = "not-allowed";
    });
    // ---------------------------------

    window.speechSynthesis.cancel();
    dadosTreinamento.push(valor);
    const n = document.getElementById('notification');
    const bgImage = document.getElementById('bg-image');
    const perguntaAtual = jornada[diaAtual].q;

    // --- LÓGICA DE CONSEQUÊNCIAS VISUAIS (MANTIDA INTEGRALMENTE) ---
    if (perguntaAtual.includes("canteiro de obras")) {
        if (valor === 'determinado') bgImage.style.backgroundImage = "url('0_1_paralizacaodaobra.png')";
        else if (valor === 'pacificador') bgImage.style.backgroundImage = "url('0_2_audienciapublica.png')";
        else if (valor === 'cauteloso') bgImage.style.backgroundImage = "url('0_3_documentararea.png')";
        else bgImage.style.backgroundImage = "url('0_4_organizarprotesto.png')";
    }
    else if (perguntaAtual.includes("palmito")) {
        if (valor === 'determinado') bgImage.style.backgroundImage = "url('1_1_chamoupolicia.png')";
        else if (valor === 'pacificador') bgImage.style.backgroundImage = "url('1_2_alertartrilheiros.png')";
        else if (valor === 'cauteloso') bgImage.style.backgroundImage = "url('1_3_naoconfrontaresair.png')";
        else bgImage.style.backgroundImage = "url('1_4_tirarfotodosinfratores.png')";
    }
    else if (perguntaAtual.includes("Praia Central")) {
        if (valor === 'determinado') bgImage.style.backgroundImage = "url('2_1_esgotoclandestinolacrado.png')";
        else if (valor === 'pacificador') bgImage.style.backgroundImage = "url('2_2_campanhapraialimpa.png')";
        else if (valor === 'cauteloso') bgImage.style.backgroundImage = "url('2_3_procuraroutrapraia.png')";
        else bgImage.style.backgroundImage = "url('2_4_protestarnaprefeitura.png')";
    }
    else if (perguntaAtual.includes("Morro do Cristo")) {
        if (valor === 'impulsivo') bgImage.style.backgroundImage = "url('3_1_interrompersonsaltos.png')";
        else if (valor === 'pacificador') bgImage.style.backgroundImage = "url('3_2_guiaabiental.png')";
        else if (valor === 'cauteloso') bgImage.style.backgroundImage = "url('3_3_voltaremhorariosmaiscalmos.png')";
        else bgImage.style.backgroundImage = "url('3_4_cercaraarea.png')";
    }
    else if (perguntaAtual.includes("Greenpeace")) {
        if (valor === 'impulsivo') bgImage.style.backgroundImage = "url('4_1_seinscreveragora.png')";
        else if (valor === 'pacificador') bgImage.style.backgroundImage = "url('4_2_divulgarparaosamigos.png')";
        else if (valor === 'cauteloso') bgImage.style.backgroundImage = "url('4_3_verificarnaagenda.png')";
        else bgImage.style.backgroundImage = "url('4_4_estudarbiologiamarinha.png')";
    }
    else if (perguntaAtual.includes("Mercado Municipal")) {
        if (valor === 'determinado') bgImage.style.backgroundImage = "url('5_1_leidebanimento.png')";
        else if (valor === 'pacificador') bgImage.style.backgroundImage = "url('5_2_oficinadesacolasdepapel.png')";
        else if (valor === 'cauteloso') bgImage.style.backgroundImage = "url('5_3_ecobags.png')";
        else bgImage.style.backgroundImage = "url('5_4_reclamandocomosboxes.png')";
    }
    else if (perguntaAtual.includes("bicho-preguiça")) {
        if (valor === 'impulsivo') bgImage.style.backgroundImage = "url('6_1_pararotransito.png')";
        else if (valor === 'determinado') bgImage.style.backgroundImage = "url('6_2_chamarresgate.png')";
        else if (valor === 'pacificador') bgImage.style.backgroundImage = "url('6_3_sinalizandoparaosmotoristas.png')";
        else if (valor === '6_4_observardelonge') bgImage.style.backgroundImage = "url('6_4_observardelonge.png')";
    }
    else if (perguntaAtual.includes("manguezal")) {
        if (valor === 'determinado') bgImage.style.backgroundImage = "url('7_1_denunciaparaoiat.png')";
        else if (valor === 'impulsivo') bgImage.style.backgroundImage = "url('7_2_postarvideo.png')";
        else if (valor === 'pacificador') bgImage.style.backgroundImage = "url('7_3_palestrasescolares.png')";
        else bgImage.style.backgroundImage = "url('7_4_acionarpoliciaambiental.png')";
    }
    else if (perguntaAtual.includes("Obras na orla")) {
        if (valor === 'impulsivo') bgImage.style.backgroundImage = "url('8_1_preocupadourgente.png')";
        else if (valor === 'pacificador') bgImage.style.backgroundImage = "url('8_2_debaterprojeto.png')";
        else if (valor === 'observador') bgImage.style.backgroundImage = "url('8_3_fiscalizarlicencas.png')";
        else bgImage.style.backgroundImage = "url('8_4_confiarnosengenheiros.png')";
    }
    else if (perguntaAtual.includes("pesca artesanal")) {
        if (valor === 'determinado') bgImage.style.backgroundImage = "url('9_1_proibirplasticosnabaia.png')";
        else if (valor === 'pacificador') bgImage.style.backgroundImage = "url('9_2_apoiarcooperativas.png')";
        else if (valor === 'cauteloso') bgImage.style.backgroundImage = "url('9_3_consumirmenosplastico.png')";
        else bgImage.style.backgroundImage = "url('9_4_protestarnotrapiche.png')";
    }

    n.innerHTML = `${notificacao}<br><b style="color:var(--greenpeace-yellow)">A natureza irá se lembrar disso.</b>`;
    n.style.opacity = 1;
    
    const narrador = new SpeechSynthesisUtterance(`${notificacao}. A natureza irá se lembrar disso.`);
    narrador.lang = 'pt-BR';
    window.speechSynthesis.speak(narrador);

    setTimeout(() => { 
        n.style.opacity = 0; 
        diaAtual++; 
        carregarCena(); 
    }, 7000);
}

        function ouvirTexto(id) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(document.getElementById(id).innerText);
            msg.lang = 'pt-BR';
            window.speechSynthesis.speak(msg);
        }

        function finalizarJogoIA() {
            window.speechSynthesis.cancel(); // Limpa filas travadas
const wakeUp = new SpeechSynthesisUtterance("");
window.speechSynthesis.speak(wakeUp);
            let probs = { pacificador: 0.2, determinado: 0.2, cauteloso: 0.2, impulsivo: 0.2, observador: 0.2 };
            dadosTreinamento.forEach(v => {
                for (let p in probs) probs[p] *= modeloIA[v][p];
                let total = Object.values(probs).reduce((a, b) => a + b);
                for (let p in probs) probs[p] /= total;
            });

            const perfilFinal = Object.keys(probs).reduce((a, b) => probs[a] > probs[b] ? a : b);
            
            const resultados = {
                observador: {
                    texto: "Através da escolha que você fez, o futuro de Guaratuba se transformou em um lugar onde a tecnologia cuida da natureza. Com o uso de boias inteligentes e sensores no mar, as pessoas conseguiram descobrir qualquer sujeirinha antes mesmo que ela virasse um problema grave. Essa sua decisão de monitorar os peixes e a água funcionou como um escudo invisível que manteve tudo azul e limpo por décadas. Foi a sua ação, agindo como um verdadeiro guardião digital, que garantiu esse cenário cheio de vida para as próximas gerações.",
                    img: "final_baia_observador.png"
                },
                impulsivo: {
                    texto: "Através da escolha que você fez, o futuro de Guaratuba em 40 anos se tornou um lugar triste e cheio de sujeira. Como as pessoas decidiram construir tudo rápido e ignorar o lixo, a praia sumiu debaixo de garrafas plásticas e o mar ficou escuro e perigoso. Essa sua decisão de não planejar e não cuidar da natureza quebrou o equilíbrio que existia, fazendo os peixes irem embora. Foi a sua ação, ao esquecer de proteger o meio ambiente, que permitiu que o lixo e a poluição vencessem essa batalha.",
                    img: "final_baia_impulsivo.png"
                },
                cauteloso: {
                    texto: "Através da escolha que você fez, o futuro de Guaratuba em 40 anos se transformou em um paraíso natural e muito calmo. Você decidiu que o melhor era deixar a natureza em paz, sem construir prédios ou estradas perto demais da água da baía. Essa sua decisão de manter distância e respeitar o espaço do mar funcionou como um abraço protetor que deixou as plantas e os animais crescerem livres. Foi a sua ação, escolhendo a segurança e o silêncio, que garantiu que a praia continuasse perfeita e selvagem para sempre.",
                    img: "final_baia_cauteloso.png"
                },
                determinado: {
                    texto: "Através da escolha que você fez, o futuro de Guaratuba em 40 anos se transformou em um exemplo de cidade forte e moderna. Você decidiu construir muros de pedra e portos organizados para segurar a força das ondas e organizar o movimento dos barcos. Essa sua decisão de usar a engenharia para domar o mar garantiu que a cidade pudesse crescer sem medo das ressacas ou das tempestades. Foi a sua ação, agindo com firmeza e coragem para transformar a orla, que criou um lugar seguro e pronto para o progresso de todos.",
                    img: "final_baia_determinado.png"
                },
                pacificador: {
                    texto: "Através da escolha que você fez, o futuro de Guaratuba se transformou em um lugar de união entre as pessoas e a natureza. Você decidiu que o segredo era o equilíbrio, criando espaços onde as famílias podem brincar sem machucar os animais e as plantas da baía. Essa sua decisão de fazer as pazes com o meio ambiente funcionou como uma ponte de amizade entre a cidade e o mar. Foi a sua ação, escolhendo a convivência e o respeito, que garantiu um cenário de paz onde todos vivem em harmonia.",
                    img: "final_baia_pacificador.png"
                }
            };

            const res = resultados[perfilFinal];
            document.getElementById('bg-image').style.backgroundImage = `url('${res.img}')`;
            
            const interface = document.getElementById('game-interface');
            interface.innerHTML = `
                <div style="text-align:center; height:100%; display:flex; flex-direction:column; justify-content: space-between;">
                    <div style="display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 5px;">
                        <b style="color:var(--greenpeace-yellow)">RELATÓRIO DE IMPACTO (40 ANOS DEPOIS)</b>
                        <button class="btn-audio-acessivel" style="width: 35px; height: 35px; font-size: 1rem;" onclick="ouvirTexto('texto-conclusao')">🔊</button>
                    </div>
                    <div id="texto-conclusao" style="overflow-y:auto; font-size:0.88rem; line-height:1.4; padding:5px; flex:1; text-align:justify; color:#fff;">
                        ${res.texto}
                    </div>
                    <button class="btn-escolha" onclick="location.reload()" style="margin-top:10px; height:45px; width: 100%;">REINICIAR MISSÃO</button>
                </div>
            `;
            
            const narrarFinal = new SpeechSynthesisUtterance(res.texto);
            narrarFinal.lang = 'pt-BR';
            window.speechSynthesis.speak(narrarFinal);
        }
    </script>
</body>

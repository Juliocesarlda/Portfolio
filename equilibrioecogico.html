<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Equilíbrio: Eco-Edition (Greenpeace & AI)</title>
    <style>
        :root { 
            --greenpeace-green: #3d7e1f; 
            --greenpeace-yellow: #ffde00; 
            --text-white: #ffffff; 
            --bg-dark: #1a1a1a;
        }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            overflow: hidden; color: var(--text-white); 
            display: flex; flex-direction: column; 
        }

        /* --- TELA DE INTRODUÇÃO --- */
        #intro-screen { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #000; z-index: 2000; display: flex; 
            flex-direction: column; align-items: center; justify-content: center; 
            transition: opacity 1s ease; text-align: center; padding: 20px;
        }
        #intro-bg { 
            position: absolute; width: 100%; height: 100%; 
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.8)), url('equilibrioeco.png'); 
            background-size: cover; background-position: center; opacity: 0.8; z-index: -1; 
        }
        .titulo-intro { 
            font-size: clamp(2rem, 10vw, 4rem); color: var(--greenpeace-yellow); 
            text-transform: uppercase; margin: 0; text-shadow: 0 0 20px rgba(255, 222, 0, 0.5); 
        }
        .btn-play { 
            background: transparent; border: 2px solid var(--greenpeace-yellow); 
            color: var(--greenpeace-yellow); padding: 15px 40px; font-size: 1.1rem; 
            cursor: pointer; text-transform: uppercase; margin-top: 20px;
        }

        /* --- ÁREA VISUAL --- */
        #container-visual { flex: 1; position: relative; width: 100%; background: #000; display: flex; overflow: hidden; }
        #bg-image { width: 100%; height: 100%; background-size: contain; background-repeat: no-repeat; background-position: center; transition: background-image 0.6s ease; }

        /* --- INTERFACE DE RESPOSTAS (CORRIGIDA) --- */
        #game-interface { 
            min-height: 45%; background: var(--bg-dark); 
            padding: 12px; box-sizing: border-box; display: flex; 
            flex-direction: column; border-top: 4px solid var(--greenpeace-green); 
            z-index: 10; overflow-y: auto;
        }

        #pergunta-texto { 
            font-size: clamp(0.9rem, 4vw, 1.1rem); line-height: 1.3; 
            font-weight: 600; text-align: center; margin-bottom: 12px;
        }

        #botoes-respostas { 
            display: grid; grid-template-columns: 1fr; gap: 8px; width: 100%; 
            box-sizing: border-box;
        }
        @media (min-width: 768px) { #botoes-respostas { grid-template-columns: 1fr 1fr; } }

        /* AJUSTE DOS BOTÕES PARA NÃO SAIR DA TELA */
        .wrapper-opcao { 
            display: flex; gap: 6px; align-items: stretch; width: 100%; box-sizing: border-box;
        }

        .btn-escolha { 
            flex: 1; min-width: 0; background: #2a2a2a; border: 1px solid #444; color: #fff; 
            padding: 10px; font-size: 0.8rem; cursor: pointer; text-transform: uppercase;
            display: flex; align-items: center; justify-content: center; text-align: center;
            word-wrap: break-word; overflow-wrap: break-word;
        }

        .btn-audio-acessivel {
            flex-shrink: 0; width: 44px; background: var(--greenpeace-green); border: none; 
            color: var(--greenpeace-yellow); cursor: pointer; border-radius: 4px; 
            font-size: 1.1rem; display: flex; align-items: center; justify-content: center;
        }

        /* NOTIFICAÇÃO */
        #notification { 
            position: fixed; top: 10px; left: 50%; transform: translateX(-50%); 
            width: 85%; background: rgba(0,0,0,0.95); border: 1px solid var(--greenpeace-green); 
            padding: 12px; border-radius: 8px; opacity: 0; transition: opacity 0.5s; z-index: 3000; text-align: center; 
        }

        #timer-container { width: 100%; height: 4px; background: #333; margin-top: 10px; }
        #timer-bar { width: 100%; height: 100%; background: var(--greenpeace-yellow); }
    </style>
</head>
<body>

    <audio id="bg-music" loop><source src="slap-bass-riff-dan-barracuda-1-00-04.mp3" type="audio/mpeg"></audio>

    <div id="intro-screen">
        <div id="intro-bg"></div>
        <h1 class="titulo-intro">EQUILÍBRIO</h1>
        <button class="btn-play" onclick="comecarJogo()">INICIAR MISSÃO</button>
    </div>

    <div id="notification"></div>
    <div id="container-visual"><div id="bg-image"></div></div>
    
    <div id="game-interface">
        <div id="pergunta-texto">Carregando...</div>
        <div id="botoes-respostas"></div>
        <div id="timer-container"><div id="timer-bar"></div></div>
    </div>

    <script>
        const modeloIA = {
            pacificador: { pacificador: 0.85, determinado: 0.10, cauteloso: 0.03, impulsivo: 0.02, observador: 0.05 },
            determinado: { pacificador: 0.05, determinado: 0.85, cauteloso: 0.05, impulsivo: 0.05, observador: 0.05 },
            cauteloso:   { pacificador: 0.10, determinado: 0.05, cauteloso: 0.80, impulsivo: 0.05, observador: 0.10 },
            impulsivo:   { pacificador: 0.02, determinado: 0.08, cauteloso: 0.10, impulsivo: 0.80, observador: 0.05 },
            observador:  { pacificador: 0.10, determinado: 0.05, cauteloso: 0.15, impulsivo: 0.05, observador: 0.80 }
        };

        let dadosTreinamento = []; 
        let diaAtual = 0;

        const jornada = [
            { q: "Na obra da ponte de Guaratuba, você decide:", img: "0_0_pontedeguaratuba.png", 
              opcoes: [{ t: "Exigir a paralisação", v: "determinado", n: "Rigor legal." }, { t: "Audiência pública", v: "pacificador", n: "Diálogo." }, { t: "Documentar local", v: "cauteloso", n: "Memória." }, { t: "Organizar protesto", v: "impulsivo", n: "Urgência." }] },
            { q: "Extração ilegal de palmito no Cabaraquara. O que fazer?", img: "1_0_extracaoilegaldepalmito.png", 
              opcoes: [{ t: "Chamar Polícia", v: "determinado", n: "Lei." }, { t: "Alertar trilheiros", v: "pacificador", n: "Rede." }, { t: "Sair em segurança", v: "cauteloso", n: "Cuidado." }, { t: "Tirar fotos", v: "impulsivo", n: "Provas." }] },
            { q: "Esgoto clandestino na Praia Central. Como agir?", img: "esgotoclandestinoaberto.png", 
              opcoes: [{ t: "Exigir lacre", v: "determinado", n: "Sanitário." }, { t: "Campanha limpeza", v: "pacificador", n: "Educação." }, { t: "Ir a outra praia", v: "cauteloso", n: "Fuga." }, { t: "Protestar na prefeitura", v: "impulsivo", n: "Pressão." }] },
            { q: "Som alto e lixo no Morro do Cristo afetam as aves.", img: "3_0_morrodocristosomalto.png", 
              opcoes: [{ t: "Pedir silêncio", v: "impulsivo", n: "Confronto." }, { t: "Guias ambientais", v: "pacificador", n: "Turismo." }, { t: "Ir em horários calmos", v: "cauteloso", n: "Respeito." }, { t: "Cercar a área", v: "determinado", n: "Proteção." }] },
            { q: "Vagas no Greenpeace para monitorar tartarugas marinhas.", img: "tartaruganapraiadeguaratuba.png", 
              opcoes: [{ t: "Me inscrever agora", v: "impulsivo", n: "Imediato." }, { t: "Divulgar a amigos", v: "pacificador", n: "Rede." }, { t: "Avaliar meu tempo", v: "cauteloso", n: "Realista." }, { t: "Estudar biologia", v: "determinado", n: "Técnico." }] },
            { q: "Uso de sacolas plásticas no Mercado Municipal.", img: "mercadomucipalsacolasplasticas.png", 
              opcoes: [{ t: "Propor banimento", v: "determinado", n: "Lei." }, { t: "Usar ecobags", v: "cauteloso", n: "Hábito." }, { t: "Oficina de papel", v: "pacificador", n: "Educação." }, { t: "Reclamar com boxes", v: "impulsivo", n: "Queixa." }] },
            { q: "Bicho-preguiça tentando atravessar a rodovia PR-412.", img: "bichopreguiçaatravessandoestrada.png", 
              opcoes: [{ t: "Parar o trânsito", v: "impulsivo", n: "Risco." }, { t: "Chamar resgate", v: "determinado", n: "Técnico." }, { t: "Sinalizar carros", v: "pacificador", n: "Alerta." }, { t: "Observar e anotar", v: "observador", n: "Ciência." }] },
            { q: "Manguezal da Baía sendo aterrado ilegalmente.", img: "aterramentoilegal.png", 
              opcoes: [{ t: "Denunciar ao IAT", v: "determinado", n: "Oficial." }, { t: "Postar vídeo", v: "impulsivo", n: "Redes." }, { t: "Aulas de ecologia", v: "pacificador", n: "Escola." }, { t: "Acionar Força Verde", v: "determinado", n: "Polícia." }] },
            { q: "Obras na orla afetam a restinga. O que sente?", img: "8_0_obrasnasdunaserestinga.png", 
              opcoes: [{ t: "Alerta de desastre", v: "impulsivo", n: "Medo." }, { t: "Debater projeto", v: "pacificador", n: "Diálogo." }, { t: "Fiscalizar licença", v: "observador", n: "Técnico." }, { t: "Confiar na obra", v: "pacificador", n: "Neutro." }] },
            { q: "Microplásticos ameaçam a pesca na Baía.", img: "9_0_baiadeguaratuba.png", 
              opcoes: [{ t: "Proibir plásticos", v: "determinado", n: "Rigor." }, { t: "Apoiar pescadores", v: "pacificador", n: "Social." }, { t: "Reduzir consumo", v: "cauteloso", n: "Eu." }, { t: "Protestar no trapiche", v: "impulsivo", n: "Ação." }] }
        ];

        function comecarJogo() {
            document.getElementById('bg-music').play().catch(() => {});
            window.speechSynthesis.speak(new SpeechSynthesisUtterance(""));
            document.getElementById('intro-screen').style.opacity = '0';
            setTimeout(() => { document.getElementById('intro-screen').style.display = 'none'; carregarCena(); }, 1000);
        }

        function carregarCena() {
            if (diaAtual >= jornada.length) { finalizarJogoIA(); return; }
            const cena = jornada[diaAtual];
            document.getElementById('bg-image').style.backgroundImage = `url('${cena.img}')`;
            
            document.getElementById('pergunta-texto').innerHTML = `
                <div style="display: flex; align-items: center; justify-content: center; gap: 8px;">
                    <span id="txt-pergunta" style="flex:1">${cena.q}</span>
                    <button class="btn-audio-acessivel" style="height:44px" onclick="ouvirTexto('txt-pergunta')">🔊</button>
                </div>
            `;

            const container = document.getElementById('botoes-respostas');
            container.innerHTML = "";
            cena.opcoes.forEach((opt, index) => {
                const idOpt = `opt-${index}`;
                const wrapper = document.createElement('div');
                wrapper.className = "wrapper-opcao";
                wrapper.innerHTML = `
                    <button class="btn-escolha" onclick="escolher('${opt.n}', '${opt.v}')">
                        <span id="${idOpt}">${opt.t}</span>
                    </button>
                    <button class="btn-audio-acessivel" onclick="ouvirTexto('${idOpt}')">🔊</button>
                `;
                container.appendChild(wrapper);
            });
        }

        function escolher(notificacao, valor) {
            window.speechSynthesis.cancel();
            dadosTreinamento.push(valor);
            const n = document.getElementById('notification');
            n.innerHTML = notificacao + `<br><small>A natureza lembrará disso.</small>`;
            n.style.opacity = 1;
            
            const msg = new SpeechSynthesisUtterance(notificacao + ". A natureza irá se lembrar disso.");
            msg.lang = 'pt-BR';
            window.speechSynthesis.speak(msg);

            document.querySelectorAll('.btn-escolha, .btn-audio-acessivel').forEach(b => b.style.pointerEvents = 'none');
            setTimeout(() => { n.style.opacity = 0; diaAtual++; carregarCena(); }, 5500); 
        }

        function ouvirTexto(id) {
            window.speechSynthesis.cancel();
            const txt = document.getElementById(id).innerText;
            const msg = new SpeechSynthesisUtterance(txt);
            msg.lang = 'pt-BR';
            window.speechSynthesis.speak(msg);
        }

        function finalizarJogoIA() {
            let probs = { pacificador: 0.25, determinado: 0.25, cauteloso: 0.25, impulsivo: 0.25, observador: 0.25 };
            dadosTreinamento.forEach(escolha => {
                if (modeloIA[escolha]) {
                    for (let p in probs) probs[p] *= modeloIA[escolha][p];
                    let total = Object.values(probs).reduce((a, b) => a + b);
                    for (let p in probs) probs[p] /= total;
                }
            });

            const perfilFinal = Object.keys(probs).reduce((a, b) => probs[a] > probs[b] ? a : b);
            const resultados = {
                observador: { img: "final_baia_observador.png", texto: "Futuro tecnológico: Guaratuba agora usa sensores para proteger o mar." },
                impulsivo: { img: "final_baia_impulsivo.png", texto: "Futuro crítico: A falta de cuidado transformou a baía em um desastre ecológico." },
                cauteloso: { img: "final_baia_cauteloso.png", texto: "Futuro natural: O respeito à natureza manteve a praia selvagem e pura." },
                determinado: { img: "final_baia_determinado.png", texto: "Futuro urbano: A engenharia e as regras fortes protegeram a cidade do mar." },
                pacificador: { img: "final_baia_pacificador.png", texto: "Futuro em harmonia: Pessoas e natureza vivem em equilíbrio perfeito." }
            };

            const res = resultados[perfilFinal];
            document.getElementById('bg-image').style.backgroundImage = `url('${res.img}')`;
            document.getElementById('game-interface').classList.add('final-screen');
            document.getElementById('pergunta-texto').innerHTML = `
                <div style="display:flex; align-items:center; justify-content:center; gap:8px;">
                    <b style="color:var(--greenpeace-yellow)">RELATÓRIO 2066</b>
                    <button class="btn-audio-acessivel" onclick="ouvirTexto('texto-conclusao')">🔊</button>
                </div>
                <div id="texto-conclusao" style="text-align:justify; padding:8px; font-size:0.9rem">${res.texto}</div>
            `;
            document.getElementById('botoes-respostas').innerHTML = `<button class="btn-escolha" onclick="location.reload()" style="max-width:200px">REINICIAR</button>`;
            document.getElementById('timer-container').style.display = 'none';
            ouvirTexto('texto-conclusao');
        }
    </script>
</body>
</html>
